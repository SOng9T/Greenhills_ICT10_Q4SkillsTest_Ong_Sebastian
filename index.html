<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker | 10-Topaz</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.5.2/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.5.2/core.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: #ffffff;
            padding: 40px 20px;
            color: #000000;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #000000;
            border-radius: 0px;
            padding: 30px;
            box-shadow: none;
        }
        
        h1 {
            font-family: 'Times New Roman', Times, serif;
            font-size: 28px;
            font-weight: bold;
            color: #000000;
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #000000;
        }
        
        h3 {
            font-family: 'Times New Roman', Times, serif;
            font-size: 18px;
            font-weight: bold;
            color: #000000;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .input-area {
            margin-bottom: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 0px;
            border: 1px solid #000000;
        }
        
        .row {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        label {
            font-family: 'Times New Roman', Times, serif;
            font-size: 14px;
            font-weight: bold;
            min-width: 140px;
            color: #000000;
        }
        
        select, input {
            font-family: 'Times New Roman', Times, serif;
            font-size: 14px;
            padding: 8px 12px;
            border: 1px solid #000000;
            border-radius: 0px;
            background: #ffffff;
            color: #000000;
        }
        
        select {
            min-width: 150px;
        }
        
        input {
            width: 100px;
        }
        
        button {
            font-family: 'Times New Roman', Times, serif;
            font-size: 14px;
            padding: 8px 20px;
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #000000;
            border-radius: 0px;
            cursor: pointer;
            margin-right: 10px;
        }
        
        button:hover {
            background-color: #333333;
            color: #ffffff;
        }
        
        .graph-container {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 0px;
            border: 1px solid #000000;
        }
        
        #plot {
            width: 100%;
            text-align: center;
            margin-top: 15px;
        }
        
        .status-msg {
            margin-top: 10px;
            padding: 8px;
            border-radius: 0px;
            text-align: center;
            font-size: 13px;
        }
        
        .status-success {
            background-color: #e0e0e0;
            color: #000000;
            border: 1px solid #000000;
        }
        
        .stats {
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
            color: #000000;
            font-weight: bold;
        }

        .placeholder-text {
            text-align: center;
            color: #666666;
            font-style: italic;
            padding: 40px 20px;
            background: #ffffff;
            border: 1px solid #cccccc;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #000000;
            font-size: 12px;
            color: #000000;
        }
    </style>
    
    <py-config>
        packages = ["matplotlib", "numpy"]
        [[fetch]]
        files = ["main.py"]
    </py-config>
</head>
<body>
    <div class="container">
        <h1>Attendance Tracker</h1>
        
        <div class="input-area">
            <div class="row">
                <label>Select Day:</label>
                <select id="daySelect">
                    <option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                </select>
            </div>
            
            <div class="row">
                <label>Number of Absences:</label>
                <input type="number" id="absInput" value="0" min="0">
            </div>
            
            <div class="row">
                <button id="recordBtn">Record Absences</button>
                <button id="resetBtn">Reset All Data</button>
            </div>
            <div id="statusMsg" class="status-msg" style="display:none;"></div>
            <div id="statsDisplay" class="stats"></div>
        </div>
        
        <div class="graph-container">
            <h3>Weekly Absence Report</h3>
            <div id="plot">
                <div class="placeholder-text">Click "Record Absences" to view the graph</div>
            </div>
        </div>
    </div>

    <footer>Attendance Tracker | Built with Python, NumPy & Matplotlib</footer>

    <py-script src="main.py"></py-script>
</body>
</html>
