<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.5.2/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.5.2/core.js"></script> <!-- Pyscript CDN-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:ital,wght@0,400;0,700;1,400;1,700&family=Jim+Nightshade&family=Kapakana:wght@300..400&family=Pirata+One&display=swap" rel="stylesheet"> <!-- Pirata, Almendra, Jim Nightshade, and Kapakana Fonts-->
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Times New Roman', Times, serif;
            background: #ffffff;
            padding: 40px 20px;
            color: #000000;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #e0e0e0;
            padding: 30px;
        }
        
        h1 {
            font-family: 'Times New Roman', Times, serif;
            font-size: 24px;
            font-weight: normal;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .input-area {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #cccccc;
            background: #fafafa;
        }
        
        .row {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        label {
            font-family: 'Times New Roman', Times, serif;
            font-size: 14px;
            min-width: 100px;
        }
        
        select, input {
            font-family: 'Times New Roman', Times, serif;
            font-size: 14px;
            padding: 6px 10px;
            border: 1px solid #999999;
            background: #ffffff;
        }
        
        select {
            min-width: 150px;
        }
        
        input {
            width: 100px;
        }
        
        button {
            font-family: 'Times New Roman', Times, serif;
            font-size: 14px;
            padding: 6px 15px;
            background: #f0f0f0;
            border: 1px solid #999999;
            cursor: pointer;
            margin-right: 10px;
        }
        
        button:hover {
            background: #e0e0e0;
        }
        
        .graph-container {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid #cccccc;
            background: #ffffff;
        }
        
        .graph-container h3 {
            font-family: 'Times New Roman', Times, serif;
            font-size: 16px;
            font-weight: normal;
            margin-bottom: 15px;
            text-align: center;
        }
        
        #plot {
            width: 100%;
            text-align: center;
        }
    </style>
    
    <py-config>
        packages = ["matplotlib", "numpy"]
    </py-config>
</head>
<body>
    <div class="container">
        <h1>Attendance Tracker</h1>
        
        <div class="input-area">
            <div class="row">
                <label>Select Day:</label>
                <select id="daySelect">
                    <option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                </select>
            </div>
            
            <div class="row">
                <label>Number of Absences:</label>
                <input type="number" id="absInput" value="0" min="0">
            </div>
            
            <div class="row">
                <button id="recordBtn">Record Absence</button>
                <button id="resetBtn">Reset All</button>
            </div>
        </div>
        
        <div class="graph-container">
            <h3>Weekly Absence Report</h3>
            <div id="plot"></div>
        </div>
    </div>

    <py-script src="main.py"></py-script>
</body>
</html>
